name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0). Leave empty to use version from package.json'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Set version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION=$(echo "${VERSION}" | sed 's/^v//')
            echo "Setting version to: ${VERSION}"
            npm version "${VERSION}" --no-git-tag-version
          fi
          FINAL_VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${FINAL_VERSION}" >> $GITHUB_ENV
          echo "Publishing version: ${FINAL_VERSION}"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Show version summary
        run: |
          echo "========================================"
          echo "  n8n-nodes-solvapay v${VERSION}"
          echo "========================================"

      - name: Publish to NPM
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create and push git tag
        run: |
          git tag -f "v${VERSION}"
          git push origin "v${VERSION}" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
